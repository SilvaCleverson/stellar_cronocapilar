<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- Stellar/Blockchain pattern (subtle) -->
  <g opacity="0.2">
    <path d="M128 200 L384 200" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M128 256 L384 256" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M128 312 L384 312" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Hair strands (main icon) -->
  <g transform="translate(256, 200)">
    <!-- Left strand -->
    <path d="M-60 0 Q-80 40 -70 80 Q-60 120 -40 140 Q-20 160 0 150" 
          stroke="url(#hairGradient)" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Center strand -->
    <path d="M0 0 Q0 50 0 100 Q0 150 0 180" 
          stroke="url(#hairGradient)" 
          stroke-width="14" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Right strand -->
    <path d="M60 0 Q80 40 70 80 Q60 120 40 140 Q20 160 0 150" 
          stroke="url(#hairGradient)" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Additional decorative strands -->
    <path d="M-30 20 Q-40 60 -30 100" 
          stroke="url(#hairGradient)" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round" opacity="0.7"/>
    <path d="M30 20 Q40 60 30 100" 
          stroke="url(#hairGradient)" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- Calendar/Time element (representing schedule) -->
  <g transform="translate(256, 320)">
    <rect x="-30" y="-20" width="60" height="50" rx="4" fill="white" opacity="0.9"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#4F46E5" stroke-width="2"/>
    <circle cx="-10" cy="5" r="3" fill="#4F46E5"/>
    <circle cx="0" cy="5" r="3" fill="#4F46E5"/>
    <circle cx="10" cy="5" r="3" fill="#4F46E5"/>
    <circle cx="-5" cy="15" r="3" fill="#4F46E5"/>
    <circle cx="5" cy="15" r="3" fill="#4F46E5"/>
  </g>
  
  <!-- Stellar/blockchain indicator (small) -->
  <g transform="translate(380, 120)">
    <path d="M0 0 L20 0 L20 30 L0 30 Z" fill="white" opacity="0.8"/>
    <path d="M5 5 L15 5 M5 15 L15 15 M5 25 L12 25" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>


