<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- CronoCapilar App Icon -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="192" height="192" rx="40" fill="url(#bgGrad)"/>
  
  <!-- Hair icon -->
  <g transform="translate(96, 70)">
    <!-- Left strand -->
    <path d="M-30 0 Q-40 20 -35 40 Q-30 60 -20 70 Q-10 80 0 75" 
          stroke="url(#hairGrad)" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Center strand -->
    <path d="M0 0 Q0 25 0 50 Q0 75 0 90" 
          stroke="url(#hairGrad)" 
          stroke-width="7" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Right strand -->
    <path d="M30 0 Q40 20 35 40 Q30 60 20 70 Q10 80 0 75" 
          stroke="url(#hairGrad)" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Calendar icon -->
  <g transform="translate(96, 140)">
    <rect x="-15" y="-10" width="30" height="25" rx="2" fill="white" opacity="0.9"/>
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#4F46E5" stroke-width="1.5"/>
    <circle cx="-5" cy="3" r="1.5" fill="#4F46E5"/>
    <circle cx="0" cy="3" r="1.5" fill="#4F46E5"/>
    <circle cx="5" cy="3" r="1.5" fill="#4F46E5"/>
    <circle cx="-2.5" cy="8" r="1.5" fill="#4F46E5"/>
    <circle cx="2.5" cy="8" r="1.5" fill="#4F46E5"/>
  </g>
</svg>


